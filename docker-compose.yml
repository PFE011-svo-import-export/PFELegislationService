services:

  # FastAPI backend
  legislation-api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env                          # ANTHROPIC_API_KEY, QDRANT_HOST/PORT/API_KEY/USE_HTTPS, etc.
    environment:
      # Qdrant points to the cloud via QDRANT_* in .env — no local override here.
      - OLLAMA_BASE_URL=http://host.docker.internal:11434  # use the host's (Windows) Ollama for GPU
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Qdrant vector DB
  legislation-vector-db:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - legislation-vector-db-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  legislation-vector-db-data:
